<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Core Blue Tech Gradient -->
    <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6fb6ff" />
      <stop offset="100%" stop-color="#1262a3" />
    </linearGradient>
    
    <!-- Faculty Teal Gradient -->
    <linearGradient id="facultyTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0" />
      <stop offset="100%" stop-color="#2f8f72" />
    </linearGradient>
    
    <!-- Student Pink/Accent Gradient -->
    <linearGradient id="studentPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb0ce" />
      <stop offset="100%" stop-color="#9d174d" />
    </linearGradient>
    
    <!-- Glassmorphic Drop Shadow Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6fb6ff" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Abstract Tech Grid Background Rings -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" stroke-dasharray="10 10"/>
  <circle cx="250" cy="250" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="10 10"/>

  <g filter="url(#glow)">
    <!-- Mortarboard Canopy (Education Theme) -->
    <path d="M 250 120 L 140 180 L 250 240 L 360 180 Z" fill="url(#techBlue)" opacity="0.95" />
    <path d="M 160 190 L 160 250 Q 250 290 340 250 L 340 190" fill="none" stroke="url(#techBlue)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Tassel Element -->
    <path d="M 360 180 L 360 240" fill="none" stroke="#6fb6ff" stroke-width="6" stroke-linecap="round" />
    <circle cx="360" cy="245" r="6" fill="#6fb6ff" />

    <!-- Circuit/Network Pathways (Technology & Connection) -->
    <path d="M 250 255 L 250 330" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6" stroke-linecap="round" />
    <path d="M 250 330 L 170 400" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6" stroke-linecap="round" />
    <path d="M 250 330 L 330 400" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Bridging connection between Student and Faculty -->
    <path d="M 170 400 L 330 400" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" />

    <!-- Central Institutional Hub Node -->
    <circle cx="250" cy="330" r="14" fill="url(#techBlue)" />
    <circle cx="250" cy="330" r="5" fill="#ffffff" />
    
    <!-- Student Node (Left Base) -->
    <circle cx="170" cy="400" r="20" fill="url(#studentPink)" />
    <circle cx="170" cy="400" r="8" fill="#ffffff" />
    <text x="170" y="445" fill="#ffb0ce" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="2">STUDENT</text>

    <!-- Faculty Node (Right Base) -->
    <circle cx="330" cy="400" r="20" fill="url(#facultyTeal)" />
    <circle cx="330" cy="400" r="8" fill="#ffffff" />
    <text x="330" y="445" fill="#a7f3d0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="2">FACULTY</text>
  </g>
</svg>
